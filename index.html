<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Scripts Manager</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .script-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .script-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .script-url {
            font-family: monospace;
            font-size: 12px;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 6px;
            word-break: break-all;
            margin: 10px 0;
        }
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .copy-btn:hover {
            background: #5a67d8;
        }
        .raw-link {
            color: #667eea;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        .install-script {
            background: #2d3748;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        code {
            background: #1a202c;
            padding: 2px 6px;
            border-radius: 4px;
            color: #68d391;
        }
        pre {
            background: #1a202c;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 Forum Scripts Manager</h1>
        <p>Central hub for all your forum enhancement scripts</p>
        <p>🔒 Private dashboard - for your use only</p>
    </div>

    <div class="script-grid" id="scripts-container"></div>

    <div class="install-script">
        <h2>📝 Quick Installation Script</h2>
        <p>Copy this code to use in your browser console or bookmarklet:</p>
        <pre id="install-code"></pre>
        <button class="copy-btn" onclick="copyInstallCode()">Copy Installation Script</button>
    </div>

    <script>
        const scripts = [
            { name: "Dynamic Loader", file: "dynamic_loader.js", description: "Handles dynamic content loading" },
            { name: "Forum Core Observer", file: "forum_core_observer.js", description: "Core mutation observer for DOM changes" },
            { name: "Forum Enhancer", file: "forum_enhancer.js", description: "Main forum enhancement features" },
            { name: "Media Optimizer", file: "media-optimizer.js", description: "Image and media optimization" },
            { name: "Forum Styles", file: "forum_style.css", description: "Custom CSS styles" },
            { name: "All Minified", file: "all.min.css", description: "Minified combined styles" }
        ];

        const repoName = window.location.pathname.split('/')[1] || 'your-repo-name';
        const rawBase = `https://raw.githubusercontent.com/${window.location.hostname.split('.')[0]}/${repoName}/main/`;

        function renderScripts() {
            const container = document.getElementById('scripts-container');
            container.innerHTML = scripts.map(script => `
                <div class="script-card">
                    <h3>${script.name}</h3>
                    <p>${script.description}</p>
                    <div class="script-url">${rawBase}${script.file}</div>
                    <button class="copy-btn" onclick="copyToClipboard('${rawBase}${script.file}')">
                        📋 Copy URL
                    </button>
                    <br>
                    <a href="${rawBase}${script.file}" target="_blank" class="raw-link">🔗 View Raw →</a>
                </div>
            `).join('');
        }

        function generateInstallScript() {
            const scriptUrls = scripts.map(s => `'${rawBase}${s.file}'`).join(',\n    ');
            return `// ==UserScript==
// @name         Forum Enhancement Pack
// @namespace    your-forum-enhancer
// @version      1.0
// @description  Load all forum scripts
// @match        *://your-forum.com/*
// @grant        none
// ==/UserScript==

(function() {
    const scripts = [${scriptUrls}];
    
    scripts.forEach(src => {
        const script = document.createElement('script');
        script.src = src;
        script.dataset.source = 'forum-enhancer';
        document.head.appendChild(script);
    });
    
    // Load CSS
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = '${rawBase}forum_style.css';
    document.head.appendChild(css);
})();`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('URL copied to clipboard!');
        }

        function copyInstallCode() {
            const code = document.getElementById('install-code').textContent;
            navigator.clipboard.writeText(code);
            alert('Installation script copied!');
        }

        renderScripts();
        document.getElementById('install-code').textContent = generateInstallScript();
    </script>
</body>
                                                      </html>
